<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Песни в которых я нашел себя</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            padding-top: 60px; /* Отступ для прогресс-бара */
        }

        /* Глобальный прогресс-бар */
        .global-player {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background: #1e1e1e;
            display: flex;
            align-items: center;
            padding: 0 20px;
            z-index: 1000;
            border-bottom: 2px solid #333;
        }

        .global-info {
            width: 200px;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .progress-container {
            flex-grow: 1;
            margin: 0 20px;
            display: flex;
            align-items: center;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
            accent-color: #1db954;
        }

        /* Основной контент */
        .header-title {
            text-align: center;
            font-size: 3rem;
            font-weight: bold;
            margin: 50px 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .songs-container {
            display: flex;
            flex-direction: column;
            gap: 40px;
            width: 80%;
            max-width: 1000px;
            margin: 0 auto 100px auto;
        }

        /* Карточки в шахматном порядке */
        .song-card {
            width: 45%;
            border: 2px solid #333;
            border-radius: 12px;
            padding: 20px;
            background: #181818;
            transition: transform 0.3s;
        }

        .song-card:nth-child(odd) {
            align-self: flex-start;
        }

        .song-card:nth-child(even) {
            align-self: flex-end;
        }

        .song-card:hover {
            transform: scale(1.02);
            border-color: #1db954;
        }

        .song-title {
            font-size: 1.5rem;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
        }

        .song-cover {
            width: 100%;
            height: 250px;
            background-color: #282828;
            border-radius: 8px;
            object-fit: cover;
            margin-bottom: 15px;
        }

        .local-player {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .play-btn {
            background: #1db954;
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .play-btn:hover {
            background: #1ed760;
        }

        .snippet-text {
            font-style: italic;
            color: #b3b3b3;
            text-align: center;
            line-height: 1.5;
            border-top: 1px solid #333;
            padding-top: 15px;
        }

        @media (max-width: 768px) {
            .song-card {
                width: 100%;
                align-self: center !important;
            }
            .header-title {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <div class="global-player">
        <div class="global-info" id="global-song-name">Ничего не играет</div>
        <div class="progress-container">
            <input type="range" id="global-seek" min="0" max="100" value="0">
        </div>
        <div id="time-display">0:00 / 0:00</div>
    </div>

    <h1 class="header-title">Песни в которых я нашел себя</h1>

    <div class="songs-container">
        
        <div class="song-card" data-src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" data-start="30">
            <div class="song-title">Название Песни 1</div>
            <img src="https://via.placeholder.com/400x250/1db954/ffffff?text=Обложка+1" alt="Обложка 1" class="song-cover">
            <div class="local-player">
                <button class="play-btn">▶</button>
                <input type="range" class="local-seek" min="0" max="100" value="0" disabled>
            </div>
            <div class="snippet-text">
                "Здесь будет текст отрывка,<br>
                Который значит для меня многое..."
            </div>
        </div>

        <div class="song-card" data-src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" data-start="65">
            <div class="song-title">Название Песни 2</div>
            <img src="https://via.placeholder.com/400x250/ff5722/ffffff?text=Обложка+2" alt="Обложка 2" class="song-cover">
            <div class="local-player">
                <button class="play-btn">▶</button>
                <input type="range" class="local-seek" min="0" max="100" value="0" disabled>
            </div>
            <div class="snippet-text">
                "Вторая песня, другие слова,<br>
                Но та же самая душа..."
            </div>
        </div>

        <div class="song-card" data-src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" data-start="15">
            <div class="song-title">Название Песни 3</div>
            <img src="https://via.placeholder.com/400x250/2196f3/ffffff?text=Обложка+3" alt="Обложка 3" class="song-cover">
            <div class="local-player">
                <button class="play-btn">▶</button>
                <input type="range" class="local-seek" min="0" max="100" value="0" disabled>
            </div>
            <div class="snippet-text">
                "Третий отрывок звучит здесь,<br>
                Моя история в каждой строке."
            </div>
        </div>

    </div>

    <script>
        const audio = new Audio();
        const globalSeek = document.getElementById('global-seek');
        const globalSongName = document.getElementById('global-song-name');
        const timeDisplay = document.getElementById('time-display');
        let currentCard = null;

        const cards = document.querySelectorAll('.song-card');

        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        cards.forEach(card => {
            const playBtn = card.querySelector('.play-btn');
            const src = card.getAttribute('data-src');
            const startTime = parseFloat(card.getAttribute('data-start'));
            const title = card.querySelector('.song-title').innerText;
            const localSeek = card.querySelector('.local-seek');

            playBtn.addEventListener('click', () => {
                // Если кликнули на ту же песню, которая играет
                if (currentCard === card && !audio.paused) {
                    audio.pause();
                    playBtn.innerText = '▶';
                    return;
                }

                // Сброс кнопок всех карточек
                document.querySelectorAll('.play-btn').forEach(btn => btn.innerText = '▶');
                
                // Настройка и запуск аудио
                if (currentCard !== card) {
                    audio.src = src;
                    audio.currentTime = startTime;
                    globalSongName.innerText = title;
                    currentCard = card;
                }
                
                audio.play();
                playBtn.innerText = '⏸';
            });
        });

        // Обновление прогресс-баров
        audio.addEventListener('timeupdate', () => {
            if (!audio.duration) return;
            
            const progressPercent = (audio.currentTime / audio.duration) * 100;
            globalSeek.value = progressPercent;
            
            timeDisplay.innerText = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`;

            if (currentCard) {
                const localSeek = currentCard.querySelector('.local-seek');
                localSeek.value = progressPercent;
            }
        });

        // Перемотка с глобального бара
        globalSeek.addEventListener('input', (e) => {
            if (audio.duration) {
                audio.currentTime = (e.target.value / 100) * audio.duration;
            }
        });
        
        audio.addEventListener('ended', () => {
            if (currentCard) {
                currentCard.querySelector('.play-btn').innerText = '▶';
            }
            globalSeek.value = 0;
        });
    </script>
</body>
</html>
